enum Role {
  USER
  ADMIN
}

#Interface

interface Person {
  id: ID!
  name: String!
}

#Types

type User implements Person {
  id: ID!
  name: String!
  email: String!
  role: Role!
}

type Skill {
  id: ID!
  designation: String!
}

type Cv implements Person {
  id: ID!
  name: String!
  age: Int!
  job: String!
  owner: User!
  skills: [Skill!]!
}

#Queries

type Query {
  hello(name: String): String!
  users: [User!]!
  cvs: [Cv!]!
  cv(id: ID!): Cv
  skills: [Skill!]!
}

#Mutation 

type Mutation {
  createCv(input: CreateCvInput!): Cv!
  updateCv(id: ID!, input: UpdateCvInput!): Cv
  deleteCv(id: ID!): Boolean!
}

#Subscription

type Subscription {
  cvAdded: Cv!
  cvUpdated: Cv!
  cvDeleted: ID!
}

#Inputs

input CreateCvInput {
  name: String!
  age: Int!
  job: String!
  ownerId: ID!
  skillIds: [ID!]!
}

input UpdateCvInput {
  name: String
  age: Int
  job: String
  ownerId: ID
  skillIds: [ID!]
}