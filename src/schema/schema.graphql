enum Role {
  USER
  ADMIN
}



#Types

type User {
  id: Int!
  name: String!
  email: String!
  role: Role!
  cvs: [Cv!]! # relation inverse

}


type Skill {
  id: Int!
  designation: String!
  cvs: [Cv!]! # relation inverse
}

type Cv {
  id: Int!
  name: String!
  age: Int!
  job: String!
  owner: User! #relation vers User
  skills: [Skill!]! #relation vers Skills
}

#Queries

#pour recuperer les skills et le user d'un Cv par son id
#c'est accessible directement coté Playground 
# query {
#   Cv(id: "1") {
#     id
#     name
#     owner {      # ← récupère le user
#       id
#       name
#       email
#     }
#     skills {     # ← récupère les skills
#       id
#       designation
#     }
#   }
# }

type Query {
  # Récupérer tous les Cvs
  cvs: [Cv!]!
  
  # Récupérer un Cv par son id
  cv(id: Int!): Cv
}

#Mutation 

type Mutation {
  createCv(input: CreateCvInput!): Cv!
  updateCv(id: Int!, input: UpdateCvInput!): Cv # => retour nullable( si l'id n'existe pas )
  deleteCv(id: Int!): Boolean! #confirmer le succès
}

#Subscription

type Subscription {
  cvAdded: Cv!
  cvUpdated: Cv!
  cvDeleted: Int! #pour minimiser les ressources ( il suffit de savoir quel id est supprimé de la base)
}

#Inputs

input CreateCvInput {
  name: String!
  age: Int!
  job: String!
  ownerId: Int!
  skillIds: [Int!]!
}

#champs identiques mais optionnels
input UpdateCvInput {
  name: String
  age: Int
  job: String
  ownerId: Int
  skillIds: [Int!]
}