enum Role {
  USER
  ADMIN
}

# Types

type User {
  id: Int!
  name: String!
  email: String!
  role: Role!
  cvs: [Cv!]!
}

type Skill {
  id: Int!
  designation: String!
  cvs: [Cv!]!
}

type Cv {
  id: Int!
  name: String!
  age: Int!
  job: String!
  owner: User!
  skills: [Skill!]!
}

# Queries

type Query {
  cvs: [Cv!]!
  cv(id: Int!): Cv
  users: [User!]!
  skills: [Skill!]!
}

# Mutations

type Mutation {
  createCv(input: CreateCvInput!): Cv!
  updateCv(id: Int!, input: UpdateCvInput!): Cv
  deleteCv(id: Int!): Boolean!
}

# Subscriptions

enum CvAction {
  ADDED
  UPDATED
  DELETED
}

type CvEvent {
  action: CvAction!
  cv: Cv
  cvId: Int
}

type Subscription {
  cvChanged: CvEvent!
}

# Inputs

input CreateCvInput {
  name: String!
  age: Int!
  job: String!
  ownerId: Int!
  skillIds: [Int!]!
}

input UpdateCvInput {
  name: String
  age: Int
  job: String
  ownerId: Int
  skillIds: [Int!]
}
