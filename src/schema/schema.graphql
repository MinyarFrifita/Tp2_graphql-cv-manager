enum Role {
  USER
  ADMIN
}

# Types

type User {
  id: ID!
  name: String!
  email: String!
  role: Role!
  cvs: [Cv!]!
}

type Skill {
  id: ID!
  designation: String!
  cvs: [Cv!]!
}

type Cv {
  id: ID!
  name: String!
  age: Int!
  job: String!
  owner: User!
  skills: [Skill!]!
}

# Queries

type Query {
  cvs: [Cv!]!
  cv(id: ID!): Cv
  users: [User!]!
  skills: [Skill!]!
}

# Mutations

type Mutation {
  createCv(input: CreateCvInput!): Cv!
  updateCv(id: ID!, input: UpdateCvInput!): Cv
  deleteCv(id: ID!): Boolean!
}

# Subscriptions

enum CvAction {
  ADDED
  UPDATED
  DELETED
}

type CvEvent {
  action: CvAction!
  cv: Cv
  cvId: ID
}

type Subscription {
  cvChanged: CvEvent!
}

# Inputs

input CreateCvInput {
  name: String!
  age: Int!
  job: String!
  ownerId: ID!
  skillIds: [ID!]!
}

input UpdateCvInput {
  name: String
  age: Int
  job: String
  ownerId: ID
  skillIds: [ID!]
}
